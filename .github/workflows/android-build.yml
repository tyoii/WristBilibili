name: Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - feature/**

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Prepare Lson dependency project
        run: |
          git clone --depth=1 https://github.com/luern0313/Lson.git ../Lson
          # 兼容本项目 Kotlin 插件版本，移除 Lson 内重复声明的 kotlin plugin version
          sed -i "s/id 'org.jetbrains.kotlin.jvm' version '[^']*'/id 'org.jetbrains.kotlin.jvm'/" ../Lson/build.gradle || true
          sed -i 's/id("org.jetbrains.kotlin.jvm") version "[^"]*"/id("org.jetbrains.kotlin.jvm")/' ../Lson/build.gradle.kts || true

      - name: Build Debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WristBilibili-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
